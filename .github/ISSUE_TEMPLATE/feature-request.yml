name: Feature Request
description: Suggest a feature
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Why is it needed?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you would like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider, and why did you rule them out?

  - type: dropdown
    id: tool_category
    attributes:
      label: Tool Category
      description: Which category of tools does this feature relate to?
      options:
        - Q&A
        - Content Generation
        - Audio Studio
        - Source Management
        - Research
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references relevant to this request.
