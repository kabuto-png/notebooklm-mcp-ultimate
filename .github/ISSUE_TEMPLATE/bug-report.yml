name: Bug Report
description: Report a bug
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Call tool '...'
        2. With parameters '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or logs if available.

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other

  - type: dropdown
    id: node
    attributes:
      label: Node.js Version
      options:
        - "18.x"
        - "20.x"
        - "22.x"
        - Other

  - type: input
    id: mcp_client
    attributes:
      label: MCP Client
      description: Which MCP client are you using? (e.g. Claude Desktop, Cursor, custom)
      placeholder: Claude Desktop

  - type: dropdown
    id: tool_profile
    attributes:
      label: Tool Profile
      options:
        - minimal
        - standard
        - full

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or configuration relevant to the bug.
