<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 12px; font-family: system-ui; }
    h3 { margin: 0 0 10px; font-size: 14px; }
    button { width: 100%; padding: 10px; margin: 4px 0; cursor: pointer; border: 1px solid #ccc; border-radius: 4px; }
    button:hover { background: #f0f0f0; }
    #status { margin-top: 10px; padding: 8px; border-radius: 4px; font-size: 12px; display: none; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <h3>NotebookLM Cookie Extractor</h3>
  <button id="extract">Extract & Copy to Clipboard</button>
  <button id="download">Extract & Download JSON</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
